<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Arrow Puzzle - A futuristic directional arrow puzzle game.">
    <meta name="theme-color" content="#03030f">
    <meta property="og:title" content="Arrow Puzzle">
    <meta property="og:description" content="Solve the ultimate directional arrow puzzles.">
    <meta property="og:type" content="website">
    <title>Arrow Puzzle</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="hud-scanline"></div>
    <div class="hud-corners">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
    </div>

    <main class="hero-container">
        <section class="hero-content">
            <h1 class="glitch-text" data-text="Arrow Puzzle">Arrow Puzzle</h1>
            <p class="tagline">Master the flow. Solve the ultimate directional arrow puzzles.</p>
            <div class="cta-group">
                <button class="btn btn-primary" aria-label="Play Arrow Puzzle Now">
                    <span class="btn-text">Play Now</span>
                </button>
                <button class="btn btn-secondary" aria-label="Watch Arrow Puzzle Trailer">
                    <span class="btn-text">Watch Trailer</span>
                </button>
            </div>
        </section>

        <section class="hero-visual" aria-hidden="true">
            <div class="arrow-grid" id="arrowGrid">
                <!-- Arrows generated by JS -->
            </div>
        </section>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
